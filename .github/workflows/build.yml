name: Build

on:
  pull_request:
    branches: [ main ]
    paths-ignore: [ "**.md" ]
  schedule:
    - cron: "0 0 * * *"

permissions: {}

jobs:
  build_arch_linux:
    name: Build (Arch Linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel # zizmor: ignore[unpinned-images]
      options: --user root

    steps:
      - name: Refresh Packages
        run: pacman -Syu --noconfirm

      - name: Install Dependencies
        run: pacman -S --needed --noconfirm base-devel git extra-cmake-modules qt6-tools hyprland yaml-cpp libevdev

      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Configure CMake
        run: cmake -B "${GITHUB_WORKSPACE}/build"

      - name: Build
        run: cmake --build "${GITHUB_WORKSPACE}/build" -j$(nproc)

  build_nixos_unstable:
    name: Build (NixOS unstable)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Install Nix
        uses: cachix/install-nix-action@fd24c48048070c1be9acd18c9d369a83f0fe94d7 # v31.8.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update flake.lock
        run: nix flake update

      - name: Build
        run: nix build -L .?submodules=1#inputactions-hyprland

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true